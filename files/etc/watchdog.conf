# NetVisionConnect — watchdog matériel
# Redémarre automatiquement le Pi s'il se fige (noyau bloqué, surcharge).
watchdog-device = /dev/watchdog
watchdog-timeout = 15
# Redémarre si la charge système explose (signe de blocage)
max-load-1 = 24
# Vérifie toutes les 10 s
interval = 10
realtime = yes
priority = 1
