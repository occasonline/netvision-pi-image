name: Build NetVisionConnect Pi image

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'Pifile'
      - 'files/**'
      - 'assets/**'
      - '.github/workflows/build-pi-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Raspberry Pi OS Lite (Bookworm arm64)
        run: |
          set -e
          curl -L -o raspios.img.xz "https://downloads.raspberrypi.com/raspios_lite_arm64_latest"
          xz -d -T0 raspios.img.xz
          mv raspios*.img raspios-lite.img 2>/dev/null || mv raspios.img raspios-lite.img
          ls -lh raspios-lite.img

      - name: Copy splash logo into theme
        run: |
          set -e
          cp assets/logo.png files/usr/share/plymouth/themes/netvision/logo.png
          ls -lh files/usr/share/plymouth/themes/netvision/logo.png

      - name: Build image with pimod
        uses: Nature40/pimod@master
        with:
          pifile: Pifile

      - name: Compress final image
        run: |
          set -e
          OUT="netvisionconnect-pi-$(date +%Y%m%d).img"
          mv raspios-lite.img "$OUT"
          xz -T0 -9 "$OUT"
          ls -lh "$OUT.xz"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: netvisionconnect-pi-image
          path: 'netvisionconnect-pi-*.img.xz'
          retention-days: 14
